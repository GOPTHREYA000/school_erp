services:
  db:
    image: postgres:16
    container_name: scoolerp_postgres
    environment:
      POSTGRES_DB: scoolerp_db
      POSTGRES_USER: scoolerp_user
      POSTGRES_PASSWORD: scoolerp_password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: scoolerp_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  pg-data:
