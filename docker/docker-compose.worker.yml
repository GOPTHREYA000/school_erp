version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"  # Bound to 0.0.0.0 internally, DO firewall strictly guards incoming access to VPC IP.
    volumes:
      - redis_data:/data

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp_celery_worker
    command: celery -A config worker -l info --max-tasks-per-child=50 --concurrency=2
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      - redis

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp_celery_beat
    command: celery -A config beat -l info
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      - redis

volumes:
  redis_data:
