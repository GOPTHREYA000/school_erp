version: '3.8'

services:
  django_api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp_api
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 5 --threads 2 --worker-class gthread
    restart: unless-stopped
    env_file:
      - ../backend/.env
    expose:
      - 8000

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../backend/static:/app/static
    depends_on:
      - django_api
